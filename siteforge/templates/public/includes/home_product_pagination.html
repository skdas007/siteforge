{% if products.paginator.num_pages > 1 %}
<nav class="d-flex justify-content-center mt-4" aria-label="Products pagination">
  <ul class="pagination mb-0 flex-wrap justify-content-center">
    {% if products.has_previous %}
    <li class="page-item">
      <a class="page-link" href="{% url 'home' %}?{% if current_category_id %}category={{ current_category_id }}&amp;{% endif %}page={{ products.previous_page_number }}#products">Previous</a>
    </li>
    {% endif %}
    <li class="page-item disabled"><span class="page-link">Page {{ products.number }} of {{ products.paginator.num_pages }}</span></li>
    {% if products.has_next %}
    <li class="page-item">
      <a class="page-link" href="{% url 'home' %}?{% if current_category_id %}category={{ current_category_id }}&amp;{% endif %}page={{ products.next_page_number }}#products">Next</a>
    </li>
    {% endif %}
  </ul>
</nav>
{% endif %}
