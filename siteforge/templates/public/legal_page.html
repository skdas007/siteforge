{% extends "base.html" %}
{% block title %}{{ seo_title }}{% endblock %}
{% block content %}
<section class="py-5 section-padding">
  <div class="container">
    <nav aria-label="breadcrumb" class="mb-4">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">{{ legal_page.title }}</li>
      </ol>
    </nav>
    <div class="row justify-content-center">
      <div class="col-lg-10 col-xl-9">
        <article class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 fw-bold mb-3">{{ legal_page.title }}</h1>
            <div class="text-muted legal-page-content">
              {{ legal_page.content|safe }}
            </div>
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
{% include "public/includes/public_site_footer.html" %}
{% endblock %}
