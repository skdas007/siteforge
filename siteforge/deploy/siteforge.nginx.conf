# Nginx config for SiteForge.
# Static and media are served from S3 when AWS_STORAGE_BUCKET_NAME is set;
# no /static/ or /media/ locations needed in that case.
# 1) Copy to /etc/nginx/sites-available/ and enable (see DEPLOYMENT.md).
# 2) Replace bobdyinternational.com www.bobdyinternational.com. /root/Mythee/siteforge/siteforge/siteforge only used if you serve media locally (no S3).

server {
    listen 80;
    server_name bobdyinternational.com www.bobdyinternational.com;
    client_max_body_size 20M;

    # Serve static from server when SERVE_STATIC_FROM_SERVER=true (replace APP_ROOT with your project path)
    location /static/ {
        alias APP_ROOT/staticfiles/;
    }
    # Only if NOT using S3 for media (media served from S3 in production)
    # location /media/ { alias APP_ROOT/media/; }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
